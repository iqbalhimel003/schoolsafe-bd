kind = "web"
previewPath = "/"
title = "SchoolSafe BD"
version = "1.0.0"
id = "artifacts/schoolsafe-bd"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18113

[services.development]
run = "pnpm --filter @workspace/schoolsafe-bd run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/schoolsafe-bd", "run", "build" ]
publicDir = "artifacts/schoolsafe-bd/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18113"
BASE_PATH = "/"
