<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#16a34a" />
    <meta name="generator" content="SafeSchool" />

    <!--
      Static defaults for the first paint and for non-JS social crawlers.
      Per-route values (canonical, hreflang, robots, JSON-LD, html lang)
      are managed dynamically by the <Seo> component (react-helmet-async).
      OG / Twitter tags below are dedup-safe because Helmet replaces meta
      tags by matching name=/property= attribute.
    -->
    <title>SafeSchool — Environmental School Safety, Preparedness &amp; Guidance for Bangladesh</title>
    <meta name="description" content="SafeSchool helps school authorities, teachers, students and guardians in Bangladesh make safer daily decisions using live weather, air quality, rainfall outlook and bilingual school-focused risk guidance." />

    <!-- Open Graph (static fallback) -->
    <meta property="og:site_name" content="SafeSchool" />
    <meta property="og:title" content="SafeSchool — Environmental School Safety for Bangladesh" />
    <meta property="og:description" content="Live weather, air quality and bilingual school-safety guidance for Bangladesh." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="%VITE_SITE_URL%/" />
    <meta property="og:image" content="%VITE_SITE_URL%/opengraph.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="SafeSchool — Environmental School Safety for Bangladesh" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:locale:alternate" content="bn_BD" />

    <!-- Twitter / X Card (static fallback) -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="SafeSchool — Environmental School Safety for Bangladesh" />
    <meta name="twitter:description" content="Live weather, air quality and bilingual school-safety guidance for Bangladesh." />
    <meta name="twitter:image" content="%VITE_SITE_URL%/opengraph.jpg" />
    <meta name="twitter:image:alt" content="SafeSchool — Environmental School Safety for Bangladesh" />

    <!-- Icons & manifest -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <link rel="manifest" href="/site.webmanifest" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+Bengali:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
